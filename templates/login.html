{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <img src="{% static 'img/alba_capital_logo.png' %}" alt="Alba Capital" class="mx-auto h-16 mb-4">
            <h2 class="text-3xl font-bold text-gray-900">Alba Capital ERP</h2>
            <p class="mt-2 text-gray-600">Sign in to your account</p>
        </div>
        
        <!-- Login Card -->
        <div class="card">
            <div class="card-body">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="username" class="form-label">
                            Username
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400"></i>
                            </div>
                            <input 
                                type="text" 
                                name="username" 
                                id="username" 
                                class="form-input pl-10" 
                                placeholder="Enter your username"
                                required
                                autofocus
                            >
                        </div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">
                            Password
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input 
                                type="password" 
                                name="password" 
                                id="password" 
                                class="form-input pl-10" 
                                placeholder="Enter your password"
                                required
                            >
                        </div>
                    </div>
                    
                    <!-- Remember Me and Forgot Password -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input 
                                id="remember" 
                                name="remember" 
                                type="checkbox" 
                                class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded"
                            >
                            <label for="remember" class="ml-2 block text-sm text-gray-700">
                                Remember me
                            </label>
                        </div>
                        
                        <div class="text-sm">
                            <a href="{% url 'core:password-reset' %}" class="text-primary-600 hover:text-primary-700 font-medium">
                                Forgot password?
                            </a>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="w-full btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Sign In
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Footer Links -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>&copy; 2026 Alba Capital. All rights reserved.</p>
            <p class="mt-2">Powered by Softlink Options Ltd</p>
        </div>
    </div>
</div>
{% endblock %}
